station_id: MIIT
name: Станция Миитовская

switches:
  # Входная горловина
  - switch_id: SW1
    normal_position: plus
    transfer_time_s: 4.0
  - switch_id: SW3
    normal_position: plus
    transfer_time_s: 4.0
  - switch_id: SW5
    normal_position: plus
    transfer_time_s: 4.0
  - switch_id: SW7
    normal_position: plus
    transfer_time_s: 4.0

  # Выходная горловина
  - switch_id: SW2
    normal_position: plus
    transfer_time_s: 4.0
  - switch_id: SW4
    normal_position: plus
    transfer_time_s: 4.0
  - switch_id: SW6
    normal_position: plus
    transfer_time_s: 4.0
  - switch_id: SW8
    normal_position: plus
    transfer_time_s: 4.0

routes:
  # === Прямой пропуск (Путь 1) ===
  - route_id: PASS_P1
    name: Пропуск по 1-му главному пути
    route_type: passthrough
    v_limit: 80.0
    switches:
      SW1: plus
      SW2: plus
    sections: ["STR_ENTER", "TRK_P1", "STR_EXIT"]

  # === Приём ===
  - route_id: ARR_P2
    name: Приём на 2-й путь
    route_type: arrival
    v_limit: 40.0
    switches:
      SW1: minus
      SW3: plus
    sections: ["STR_ENTER", "TRK_P2"]

  - route_id: ARR_P3
    name: Приём на 3-й путь
    route_type: arrival
    v_limit: 40.0
    switches:
      SW1: minus
      SW3: minus
      SW5: plus
    sections: ["STR_ENTER", "TRK_P3"]

  - route_id: ARR_P4
    name: Приём на 4-й путь
    route_type: arrival
    v_limit: 40.0
    switches:
      SW1: minus
      SW3: minus
      SW5: minus
      SW7: plus
    sections: ["STR_ENTER", "TRK_P4"]

  - route_id: ARR_P5
    name: Приём на 5-й путь
    route_type: arrival
    v_limit: 40.0
    switches:
      SW1: minus
      SW3: minus
      SW5: minus
      SW7: minus
    sections: ["STR_ENTER", "TRK_P5"]

  # === Отправление ===
  - route_id: DEP_P2
    name: Отправление со 2-го пути
    route_type: departure
    v_limit: 40.0
    switches:
      SW2: minus
      SW4: plus
    sections: ["TRK_P2", "STR_EXIT"]

  - route_id: DEP_P3
    name: Отправление с 3-го пути
    route_type: departure
    v_limit: 40.0
    switches:
      SW2: minus
      SW4: minus
      SW6: plus
    sections: ["TRK_P3", "STR_EXIT"]

  - route_id: DEP_P4
    name: Отправление с 4-го пути
    route_type: departure
    v_limit: 40.0
    switches:
      SW2: minus
      SW4: minus
      SW6: minus
      SW8: plus
    sections: ["TRK_P4", "STR_EXIT"]

  - route_id: DEP_P5
    name: Отправление с 5-го пути
    route_type: departure
    v_limit: 40.0
    switches:
      SW2: minus
      SW4: minus
      SW6: minus
      SW8: minus
    sections: ["TRK_P5", "STR_EXIT"]
