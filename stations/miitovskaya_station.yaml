station_id: MIIT
name: Станция Миитовская
# Промежуточная однониточная станция на перегонах А–Б и Б–В.
# Четыре приёмо-отправочных пути: 1П (главный, 1/18), 2П, 3П, 5П (1/11).
# НГП: sw1, sw3, sw5, sw7 — нечётные, со стороны перегона А–Б.
# ЧГП: sw2, sw4, sw6, sw8 — чётные, со стороны перегона Б–В.
# sw1/sw2 — главный ход 1П, марка 1/18, switch_time_s: 5.
# Остальные стрелки — марка 1/11, switch_time_s: 4.
# Вариантные маршруты (обход горловины) помечены суффиксом _VAR.

switches:
  # --- Нечётная горловина (НГП, сторона А) ---
  - switch_id: SW1
    normal_position: plus
    transfer_time_s: 5.0   # 1/18, главный ход 1П
  - switch_id: SW3
    normal_position: plus
    transfer_time_s: 4.0   # 1/11, разветвление 2П / группа 3П–5П
  - switch_id: SW5
    normal_position: plus
    transfer_time_s: 4.0   # 1/11, разветвление 3П / 5П
  - switch_id: SW7
    normal_position: plus
    transfer_time_s: 4.0   # 1/11, вариантный обход НГП

  # --- Чётная горловина (ЧГП, сторона Б) ---
  - switch_id: SW2
    normal_position: plus
    transfer_time_s: 5.0   # 1/18, главный ход 1П
  - switch_id: SW4
    normal_position: plus
    transfer_time_s: 4.0   # 1/11, разветвление группы 3П–5П
  - switch_id: SW6
    normal_position: plus
    transfer_time_s: 4.0   # 1/11, разветвление 2П / группа 3П–5П
  - switch_id: SW8
    normal_position: plus
    transfer_time_s: 4.0   # 1/11, съезд 3П–5П на главный ход

routes:
  # ══════════════════════════════════════════
  #  СКВОЗНОЙ ПРОПУСК
  # ══════════════════════════════════════════

  - route_id: PASS_1P
    name: Сквозной пропуск по 1П (А→Б)
    route_type: passthrough
    v_limit: 80.0
    switches:
      SW1: plus
      SW2: plus
    sections: ["SEC_APPROACH_A", "SEC_THROAT_NGP_MAIN", "TRK_1P", "SEC_THROAT_CHG_MAIN", "SEC_APPROACH_B"]

  # ══════════════════════════════════════════
  #  ПРИЁМ СО СТОРОНЫ А (НГП)
  # ══════════════════════════════════════════

  - route_id: ARR_A_1P
    name: Приём со стороны А на 1П
    route_type: arrival
    v_limit: 80.0
    switches:
      SW1: plus
    sections: ["SEC_APPROACH_A", "SEC_THROAT_NGP_MAIN", "TRK_1P"]

  - route_id: ARR_A_2P
    name: Приём со стороны А на 2П
    route_type: arrival
    v_limit: 40.0
    switches:
      SW1: minus
      SW3: plus
    sections: ["SEC_APPROACH_A", "SEC_THROAT_NGP_BRANCH", "TRK_2P"]

  - route_id: ARR_A_3P
    name: Приём со стороны А на 3П
    route_type: arrival
    v_limit: 40.0
    switches:
      SW1: minus
      SW3: minus
      SW5: plus
    sections: ["SEC_APPROACH_A", "SEC_THROAT_NGP_BRANCH", "TRK_3P"]

  - route_id: ARR_A_5P
    name: Приём со стороны А на 5П
    route_type: arrival
    v_limit: 40.0
    switches:
      SW1: minus
      SW3: minus
      SW5: minus
    sections: ["SEC_APPROACH_A", "SEC_THROAT_NGP_BRANCH", "TRK_5P"]

  # ══════════════════════════════════════════
  #  ПРИЁМ СО СТОРОНЫ Б (ЧГП)
  # ══════════════════════════════════════════

  - route_id: ARR_B_1P
    name: Приём со стороны Б на 1П
    route_type: arrival
    v_limit: 80.0
    switches:
      SW2: plus
    sections: ["SEC_APPROACH_B", "SEC_THROAT_CHG_MAIN", "TRK_1P"]

  - route_id: ARR_B_2P
    name: Приём со стороны Б на 2П
    route_type: arrival
    v_limit: 40.0
    switches:
      SW2: plus
      SW6: minus
      SW4: plus
    sections: ["SEC_APPROACH_B", "SEC_THROAT_CHG_BRANCH", "TRK_2P"]

  - route_id: ARR_B_3P
    name: Приём со стороны Б на 3П
    route_type: arrival
    v_limit: 40.0
    switches:
      SW2: plus
      SW4: minus
      SW8: plus
    sections: ["SEC_APPROACH_B", "SEC_THROAT_CHG_BRANCH", "TRK_3P"]

  - route_id: ARR_B_5P
    name: Приём со стороны Б на 5П
    route_type: arrival
    v_limit: 40.0
    switches:
      SW2: plus
      SW4: minus
      SW8: minus
    sections: ["SEC_APPROACH_B", "SEC_THROAT_CHG_BRANCH", "TRK_5P"]

  # Вариантный приём на 1П через обход ЧГП
  - route_id: ARR_B_1P_VAR
    name: Вариантный приём со стороны Б на 1П (обход)
    route_type: arrival
    v_limit: 40.0
    switches:
      SW2: minus
      SW6: plus
    sections: ["SEC_APPROACH_B", "SEC_THROAT_CHG_BRANCH", "TRK_1P"]

  # ══════════════════════════════════════════
  #  ОТПРАВЛЕНИЕ В СТОРОНУ А (НГП)
  # ══════════════════════════════════════════

  - route_id: DEP_1P_A
    name: Отправление с 1П в сторону А
    route_type: departure
    v_limit: 80.0
    switches:
      SW1: plus
    sections: ["TRK_1P", "SEC_THROAT_NGP_MAIN", "SEC_APPROACH_A"]

  - route_id: DEP_2P_A
    name: Отправление с 2П в сторону А
    route_type: departure
    v_limit: 40.0
    switches:
      SW3: plus
      SW1: minus
    sections: ["TRK_2P", "SEC_THROAT_NGP_BRANCH", "SEC_APPROACH_A"]

  - route_id: DEP_3P_A
    name: Отправление с 3П в сторону А
    route_type: departure
    v_limit: 40.0
    switches:
      SW5: plus
      SW3: minus
      SW1: minus
    sections: ["TRK_3P", "SEC_THROAT_NGP_BRANCH", "SEC_APPROACH_A"]

  - route_id: DEP_5P_A
    name: Отправление с 5П в сторону А
    route_type: departure
    v_limit: 40.0
    switches:
      SW5: minus
      SW3: minus
      SW1: minus
    sections: ["TRK_5P", "SEC_THROAT_NGP_BRANCH", "SEC_APPROACH_A"]

  # Вариантное отправление с 2П через sw7 (обход НГП)
  - route_id: DEP_2P_A_VAR
    name: Вариантное отправление с 2П в сторону А (обход)
    route_type: departure
    v_limit: 40.0
    switches:
      SW3: plus
      SW7: plus
      SW1: minus
    sections: ["TRK_2P", "SEC_THROAT_NGP_BRANCH", "SEC_APPROACH_A"]

  # ══════════════════════════════════════════
  #  ОТПРАВЛЕНИЕ В СТОРОНУ Б (ЧГП)
  # ══════════════════════════════════════════

  - route_id: DEP_1P_B
    name: Отправление с 1П в сторону Б
    route_type: departure
    v_limit: 80.0
    switches:
      SW2: plus
    sections: ["TRK_1P", "SEC_THROAT_CHG_MAIN", "SEC_APPROACH_B"]

  - route_id: DEP_2P_B
    name: Отправление с 2П в сторону Б
    route_type: departure
    v_limit: 40.0
    switches:
      SW6: minus
      SW4: plus
      SW2: plus
    sections: ["TRK_2P", "SEC_THROAT_CHG_BRANCH", "SEC_APPROACH_B"]

  - route_id: DEP_3P_B
    name: Отправление с 3П в сторону Б
    route_type: departure
    v_limit: 40.0
    switches:
      SW8: plus
      SW4: minus
      SW2: plus
    sections: ["TRK_3P", "SEC_THROAT_CHG_BRANCH", "SEC_APPROACH_B"]

  - route_id: DEP_5P_B
    name: Отправление с 5П в сторону Б
    route_type: departure
    v_limit: 40.0
    switches:
      SW8: minus
      SW4: minus
      SW2: plus
    sections: ["TRK_5P", "SEC_THROAT_CHG_BRANCH", "SEC_APPROACH_B"]

  # Вариантное отправление с 2П через sw6 (обход ЧГП)
  - route_id: DEP_2P_B_VAR
    name: Вариантное отправление с 2П в сторону Б (обход)
    route_type: departure
    v_limit: 40.0
    switches:
      SW6: plus
      SW2: minus
    sections: ["TRK_2P", "SEC_THROAT_CHG_BRANCH", "SEC_APPROACH_B"]
