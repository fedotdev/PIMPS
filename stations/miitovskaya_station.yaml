      - {id: sw1, position: minus}

  - id: route_3P_A
    name: Отправление с 3П в сторону А
    kind: departure
    from: track_3P
    to: ep_A
    speed_kmh: 40
    train_types: [freight]
    sections:
      - sec_track_3P
      - sec_throat_NGP_branch
      - sec_approach_A
    switches:
      - {id: sw5, position: plus}
      - {id: sw3, position: minus}
      - {id: sw1, position: minus}

  - id: route_5P_A
    name: Отправление с 5П в сторону А
    kind: departure
    from: track_5P
    to: ep_A
    speed_kmh: 40
    train_types: [freight]
    sections:
      - sec_track_5P
      - sec_throat_NGP_branch
      - sec_approach_A
    switches:
      - {id: sw5, position: minus}
      - {id: sw3, position: minus}
      - {id: sw1, position: minus}

  # Вариантное отправление с 2П через sw7 (обход НГП)
  - id: route_2P_A_var
    name: Вариантное отправление с 2П в сторону А (обход)
