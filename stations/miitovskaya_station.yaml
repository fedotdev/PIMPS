      - {id: sw7, position: plus}
      - {id: sw1, position: minus}

  # ══════════════════════════════════════
  #  ОТПРАВЛЕНИЕ В СТОРОНУ Б (ЧГП)
  # ══════════════════════════════════════
  - id: route_1P_B
    name: Отправление с 1П в сторону Б
    kind: departure
    from: track_1P
    to: ep_B
    speed_kmh: 80
    train_types: [freight, passenger]
    sections:
      - sec_track_1P
      - sec_throat_CHG_main
      - sec_approach_B
    switches:
      - {id: sw2, position: plus}

  - id: route_2P_B
    name: Отправление с 2П в сторону Б
    kind: departure
    from: track_2P
    to: ep_B
    speed_kmh: 40
    train_types: [freight]
    sections:
      - sec_track_2P
      - sec_throat_CHG_branch
      - sec_approach_B
    switches:
      - {id: sw6, position: plus}
      - {id: sw2, position: minus}

  - id: route_3P_B
    name: Отправление с 3П в сторону Б
    kind: departure
    from: track_3P
    to: ep_B
    speed_kmh: 40
    train_types: [freight]
    sections:
      - sec_track_3P
      - sec_throat_CHG_branch
      - sec_approach_B
    switches:
      - {id: sw8, position: plus}
      - {id: sw4, position: minus}
      - {id: sw2, position: plus}

  - id: route_5P_B
    name: Отправление с 5П в сторону Б
    kind: departure
    from: track_5P
    to: ep_B
    speed_kmh: 40
    train_types: [freight]
    sections:
      - sec_track_5P
      - sec_throat_CHG_branch
      - sec_approach_B
    switches:
      - {id: sw8, position: minus}
      - {id: sw4, position: minus}
      - {id: sw2, position: plus}

  # Вариантное отправление с 2П через sw6 (обход ЧГП)
  - id: route_2P_B_var
    name: Вариантное отправление с 2П в сторону Б (обход)
    kind: departure
    from: track_2P
    to: ep_B
    speed_kmh: 40
    train_types: [freight]
    sections:
      - sec_track_2P
      - sec_throat_CHG_branch
      - sec_approach_B
    switches:
