
locomotives:
  - id: 2ES5k
    alias: 2ЭС5К
    # Источник: ПТР РЖД, Распоряжение № 867р от 12.05.2016
    # Таблицы 18, 20; формулы 39–42, 133–134
    description: >
      Грузовой электровоз переменного тока, двухсекционный.
      Серия 2ЭС5К (Гранит), производство УЭТМ с 2004 г.
    traction: ac_25kv
    sections: 2
    mass_t: 200          # 2×100 т (нагрузка на ось 25 тн × 8 осей на секцию нет;
                          # по ПТР табл.18: масса 2×80 при 29 тн/ось, 2×100 при 25 тн/ось)
    axle_load_tf: 25      # нагрузка от оси на рельс, тн/ось
    num_axes: 12          # 6 осей на секцию × 2 секции
    length_m: 42.0        # ~21 м на секцию

    speed:
      v_max_kmh: 110      # ПТР 2016, табл.20, конструкционная

    # Тяговая характеристика (по ПТР табл.20, 2×80/1,580)
    # F, кН при нагрузке 25 тн/ось, v_p = 37,3 км/ч (скорость длительного режима)
    traction_curve:       # [v_kmh, F_kN]
      - [0,    769.0]     # Fк при трогании (расчётное)
      - [8.5,  678.1]     # начало характеристики
      - [15.5, 592.2]
      - [22.0, 544.2]
      - [29.5, 527.6]
      - [37.3, 512.7]     # скорость длительного режима (25 тн/ось)
      - [43.5, 502.2]
      - [50.4, 491.7]
      - [60.0, 431.9]
      - [70.0, 299.0]
      - [80.0, 220.5]
      - [90.0, 171.0]
      - [100.0, 134.4]
      - [110.0, 103.7]

    # Удельное основное сопротивление движению локомотива, Н/кН
    # ПТР 2016, формулы 39–40 (серия 210, 310, 410, 2116, 225, 270, 62, 262, 362)
    # применимы к 2ЭС5К как аналог группы «многоосные э/в перем. тока»
    resistance:
      wo_formula: "17.2 + 0.044*v + 0.0026*v^2"   # ф.39 (при движении)
      wx_formula: "20.5 + 0.18*v  + 0.0034*v^2"   # ф.41 (при выбеге)
      wo_coeffs:
        a: 17.2
        b: 0.044
        c: 0.0026
      wx_coeffs:
        a: 20.5
        b: 0.18
        c: 0.0034

    # Тормозные характеристики
    # ПТР 2016, формулы 133–134 (электровозы перем. тока)
    braking:
      # удельная тормозная сила θ(v), формула 133:
      # k = 2,75 · (29,4 − 50·20v − 0,0069v²)  — пересчёт на 1 тн массы
      phi_formula_ac: "2.75 * (29.4 - 50*20*v - 0.0069*v^2)"  # ф.133 ПТР
      phi_formula_ac_coeffs:
        c0:  2.75
        c1:  29.4
        c2:  50
        c3:  20         # нагрузка на ось, тн
        c4:  0.0069
      service_decel_mss:   0.5    # служебное торможение
      emergency_decel_mss: 0.8    # экстренное

    virtual_coupling_capable: false

  # Шаблон состава — 2ЭС5К + вагоны-гондолы (q₀ = 25 тн/ось)
train_consists:
  - id: freight_2es5k_52g
    alias: 2ЭС5К-52п
    description: >
      Грузовой поезд: 2ЭС5К + 52 вагона-гондолы (q₀ = 25 тн/ось).
      Масса поезда ~4940 тн, длина ~780 м.
    locomotive_id: 2es5k
    wagon_id: gondola_standard      # q₀ = 25 тн/ось → масса ~91 тн гружёный
    wagon_count: 52
    # Расчётные итоги (loader.py пересчитает автоматически)
    total_mass_t: 5140              # 200 + 52×91 + 52×22 ≈ 200+4732+нет→ 200+52×94≈5088
    total_length_m: 774             # 42 + 52×14.0 ≈ 770 м
    max_speed_kmh: 80               # ограничение по составу (гружёные гондолы)